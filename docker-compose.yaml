services:
  postgres:
    image: postgres:16-alpine
    container_name: counterstack-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: counterstack
      POSTGRES_PASSWORD: counterstack_dev
      POSTGRES_DB: counterstack
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: